<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sabores Royal</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1c45">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sabores Royal">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --navy:#0f1c45; --navy2:#1a2a5e; --navy3:#24356f;
  --gold:#c5a028; --gold2:#e0bb4a; --goldlight:#f3d98a;
  --cream:#f8f5ec; --white:#ffffff;
  --glass:rgba(255,255,255,0.06); --glass-bd:rgba(255,255,255,0.12);
  --ok:#3ecf8e; --warn:#e0a83c; --danger:#e5566d;
  --radius:18px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{
  font-family:'DM Sans',sans-serif; background:var(--navy);
  color:var(--cream); min-height:100vh; -webkit-tap-highlight-color:transparent;
  overscroll-behavior-y:none;
}
h1,h2,h3,.serif{font-family:'Playfair Display',serif;}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
input,select,textarea{font-family:inherit; font-size:15px;}
img{display:block; max-width:100%;}
::-webkit-scrollbar{width:0; height:0;}

#app{max-width:480px; margin:0 auto; min-height:100vh; position:relative;
  background:linear-gradient(180deg,var(--navy) 0%, var(--navy2) 100%);
  display:flex; flex-direction:column;}

.screen{flex:1; display:flex; flex-direction:column; animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

/* ---------- TOPBAR ---------- */
.topbar{
  display:flex; align-items:center; gap:10px; padding:14px 16px;
  background:rgba(15,28,69,0.85); border-bottom:1px solid var(--glass-bd);
  position:sticky; top:0; z-index:50; backdrop-filter:blur(10px);
}
.topbar .back{width:36px; height:36px; border-radius:50%; background:var(--glass);
  display:flex; align-items:center; justify-content:center; border:1px solid var(--glass-bd);}
.topbar h2{font-size:18px; flex:1; color:var(--goldlight);}
.topbar .logo-mini{width:32px; height:auto;}

/* ---------- GLASSMORPHISM CARD ---------- */
.glass{
  background:var(--glass); border:1px solid var(--glass-bd);
  border-radius:var(--radius); backdrop-filter:blur(14px);
}

/* ---------- HOME ---------- */
.home-header{
  padding:34px 20px 22px; text-align:center; position:relative;
  background:radial-gradient(circle at 50% 0%, rgba(197,160,40,0.18), transparent 70%);
}
.home-logo{width:108px; margin:0 auto 14px;}
.home-header h1{font-size:26px; color:var(--white); letter-spacing:.5px;}
.home-header p{font-size:13px; color:var(--gold2); margin-top:4px; letter-spacing:1.5px; text-transform:uppercase;}

.section-cards{padding:6px 18px 18px; display:flex; flex-direction:column; gap:14px;}
.section-card{
  display:flex; align-items:center; gap:14px; padding:18px;
  border-radius:var(--radius); position:relative; text-align:left;
  border:1px solid var(--glass-bd); background:var(--glass);
  transition:transform .15s ease;
}
.section-card:active{transform:scale(.97);}
.section-card.natural{background:linear-gradient(135deg, rgba(62,143,90,0.18), rgba(255,255,255,0.04));}
.section-card.golosinas{background:linear-gradient(135deg, rgba(214,90,130,0.18), rgba(255,255,255,0.04));}
.section-card.market{background:linear-gradient(135deg, rgba(60,110,200,0.18), rgba(255,255,255,0.04));}
.section-card.featured{
  border:1.5px solid var(--gold); padding:22px;
  background:linear-gradient(135deg, rgba(197,160,40,0.28), rgba(255,255,255,0.05));
  box-shadow:0 0 0 1px rgba(197,160,40,0.25), 0 8px 24px rgba(197,160,40,0.15);
}
.sc-badge{
  position:absolute; top:10px; right:12px; background:var(--gold);
  color:var(--navy); font-size:10px; font-weight:700; letter-spacing:.5px;
  padding:3px 9px; border-radius:20px; text-transform:uppercase;
}
.sc-icon{width:46px; height:46px; flex:none; display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,0.08); border-radius:14px;}
.section-card.featured .sc-icon{width:58px; height:58px;}
.sc-icon svg{width:24px; height:24px;}
.section-card.featured .sc-icon svg{width:30px; height:30px;}
.section-card h3{font-size:17px; color:var(--white); margin-bottom:2px;}
.section-card.featured h3{font-size:20px;}
.section-card p{font-size:12.5px; color:rgba(255,255,255,0.6);}
.sc-arrow{margin-left:auto; opacity:.5;}
.sc-arrow svg{width:18px; height:18px;}

.wa-float-btn{
  margin:6px 18px 24px; display:flex; align-items:center; justify-content:center; gap:10px;
  padding:14px; border-radius:50px; background:#25D366; color:#fff; font-weight:700; font-size:14.5px;
  box-shadow:0 6px 18px rgba(37,211,102,0.35);
}
.wa-float-btn svg{width:20px; height:20px;}

.offers-banner{
  margin:0 18px 18px; padding:14px 16px; border-radius:14px;
  background:linear-gradient(120deg, rgba(197,160,40,0.22), rgba(197,160,40,0.08));
  border:1px solid rgba(197,160,40,0.55);
  box-shadow:0 4px 16px rgba(197,160,40,0.12);
  display:flex; align-items:center; gap:12px; font-size:12.5px; font-weight:500;
  color:rgba(255,255,255,0.85);
}
.offers-banner .ob-icon{
  flex:none; width:38px; height:38px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.35));
}
.offers-banner .ob-icon svg{width:19px; height:19px;}
.offers-banner b{color:var(--gold2); font-weight:700;}

/* ---------- BOTTOM NAV ---------- */
.bottomnav{
  display:flex; justify-content:space-around; padding:10px 6px 14px;
  background:rgba(10,16,40,0.85); border-top:1px solid var(--glass-bd);
  position:sticky; bottom:0; backdrop-filter:blur(14px); z-index:50;
}
.bottomnav button{display:flex; flex-direction:column; align-items:center; gap:4px;
  font-size:10.5px; color:rgba(255,255,255,0.45); padding:4px 10px;}
.bottomnav button.active{color:var(--gold2);}
.bottomnav svg{width:21px; height:21px;}

/* ---------- LISTS / CATALOG ---------- */
.search-bar{margin:14px 16px; padding:11px 14px; display:flex; align-items:center; gap:8px;
  border-radius:14px; background:var(--glass); border:1px solid var(--glass-bd);}
.search-bar input{background:none; border:none; outline:none; color:var(--cream); flex:1; font-size:14px;}
.search-bar svg{width:17px; height:17px; opacity:.5;}

.chip-row{display:flex; gap:8px; padding:0 16px 12px; overflow-x:auto;}
.chip{flex:none; padding:8px 16px; border-radius:20px; font-size:12.5px; font-weight:600;
  background:var(--glass); border:1px solid var(--glass-bd); color:rgba(255,255,255,0.7); white-space:nowrap;}
.chip.active{background:var(--gold); color:var(--navy); border-color:var(--gold);}

.product-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:4px 16px 18px;}
.product-card{border-radius:16px; overflow:hidden; background:var(--glass); border:1px solid var(--glass-bd);}
.pc-img{aspect-ratio:1; background:rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; position:relative;}
.pc-img img{width:100%; height:100%; object-fit:cover;}
.pc-img svg{width:34px; height:34px; opacity:.25;}
.pc-stock-low{position:absolute; top:6px; left:6px; background:var(--warn); color:var(--navy);
  font-size:9px; font-weight:700; padding:2px 7px; border-radius:10px;}
.pc-body{padding:10px 11px 12px;}
.pc-body h4{font-size:12.5px; font-weight:600; color:var(--white); line-height:1.3; margin-bottom:4px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
.pc-price{font-size:15px; font-weight:700; color:var(--gold2);}
.pc-add{margin-top:8px; width:100%; padding:7px; border-radius:10px; background:var(--gold); color:var(--navy);
  font-weight:700; font-size:12px;}

.empty-state{padding:60px 30px; text-align:center; color:rgba(255,255,255,0.4);}
.empty-state svg{width:50px; height:50px; opacity:.3; margin:0 auto 12px;}

/* ---------- PRODUCT DETAIL ---------- */
.pd-img{aspect-ratio:1; background:rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; margin:0 16px; border-radius:18px; overflow:hidden;}
.pd-img img{width:100%; height:100%; object-fit:cover;}
.pd-body{padding:18px 18px 100px;}
.pd-body h2{font-size:21px; color:var(--white); margin-bottom:6px;}
.pd-price{font-size:22px; font-weight:700; color:var(--gold2); margin-bottom:14px;}
.pd-desc{font-size:13.5px; color:rgba(255,255,255,0.65); line-height:1.6; margin-bottom:16px;}
.qty-row{display:flex; align-items:center; gap:14px; margin-bottom:16px;}
.qty-btn{width:36px; height:36px; border-radius:10px; background:var(--glass); border:1px solid var(--glass-bd); font-size:18px; font-weight:700;}
.qty-val{font-size:17px; font-weight:700; min-width:30px; text-align:center;}
.sticky-cta{position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto;
  padding:14px 16px; background:rgba(10,16,40,0.92); backdrop-filter:blur(14px); border-top:1px solid var(--glass-bd); z-index:60;}
.btn-primary{width:100%; padding:13px; border-radius:14px; background:var(--gold); color:var(--navy);
  font-weight:700; font-size:14px; display:flex; align-items:center; justify-content:center; gap:8px;}
.btn-secondary{width:100%; padding:14px; border-radius:14px; background:var(--glass); color:var(--white);
  font-weight:600; font-size:14px; border:1px solid var(--glass-bd);}
.btn-outline-gold{width:100%; padding:14px; border-radius:14px; background:transparent; color:var(--gold2);
  font-weight:700; font-size:14px; border:1.5px solid var(--gold);}

/* ---------- CART ---------- */
.cart-item{display:flex; gap:12px; padding:14px 16px; border-bottom:1px solid var(--glass-bd);}
.cart-item img{width:60px; height:60px; border-radius:10px; object-fit:cover; background:rgba(255,255,255,0.05);}
.cart-item-body{flex:1;}
.cart-item-body h4{font-size:13.5px; color:var(--white); margin-bottom:3px;}
.cart-item-body .price{font-size:13px; color:var(--gold2); font-weight:700;}
.cart-qty{display:flex; align-items:center; gap:8px; margin-top:6px;}
.cart-qty button{width:24px; height:24px; border-radius:7px; background:var(--glass); border:1px solid var(--glass-bd); font-size:13px;}
.cart-remove{color:var(--danger); font-size:11px; margin-top:4px;}
.cart-summary{padding:16px; background:var(--glass); margin:16px; border-radius:16px;}
.summary-row{display:flex; justify-content:space-between; font-size:13.5px; padding:6px 0; color:rgba(255,255,255,0.7);}
.summary-row.total{font-size:17px; font-weight:700; color:var(--white); border-top:1px solid var(--glass-bd); margin-top:6px; padding-top:12px;}

/* ---------- FORMS ---------- */
.form-group{margin:0 16px 14px;}
.form-group label{display:block; font-size:12px; color:rgba(255,255,255,0.55); margin-bottom:6px; font-weight:600;}
.form-group input, .form-group select, .form-group textarea{
  width:100%; padding:13px 14px; border-radius:12px; background:var(--glass);
  border:1px solid var(--glass-bd); color:var(--cream); outline:none;
}
.form-group textarea{resize:vertical; min-height:70px;}

/* ---------- TOAST ---------- */
#toast-wrap{position:fixed; bottom:90px; left:0; right:0; max-width:480px; margin:0 auto;
  display:flex; flex-direction:column; gap:8px; padding:0 16px; z-index:200; pointer-events:none;}
.toast{padding:12px 16px; border-radius:12px; background:rgba(20,28,60,0.95); border:1px solid var(--glass-bd);
  color:var(--white); font-size:13px; display:flex; align-items:center; gap:8px; box-shadow:0 6px 20px rgba(0,0,0,0.3);
  animation:toastIn .25s ease;}
.toast.ok{border-color:var(--ok);} .toast.err{border-color:var(--danger);}
@keyframes toastIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}

/* ---------- MODAL ---------- */
.modal-overlay{position:fixed; inset:0; background:rgba(5,8,20,0.7); z-index:300;
  display:flex; align-items:flex-end; justify-content:center; backdrop-filter:blur(4px);}
.modal-sheet{width:100%; max-width:480px; max-height:90vh; overflow-y:auto;
  background:var(--navy2); border-radius:24px 24px 0 0; padding:20px; animation:sheetUp .25s ease;}
@keyframes sheetUp{from{transform:translateY(40px);} to{transform:translateY(0);}}
.modal-handle{width:40px; height:4px; background:rgba(255,255,255,0.2); border-radius:4px; margin:0 auto 16px;}
.modal-title{font-size:18px; color:var(--white); margin-bottom:16px;}

/* ---------- BADGES / TIERS ---------- */
.tier-badge{display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700;}
.tier-bronce{background:rgba(180,120,80,0.25); color:#e0a877;}
.tier-plata{background:rgba(180,190,200,0.25); color:#cfd6e0;}
.tier-oro{background:rgba(197,160,40,0.25); color:var(--gold2);}

/* ---------- ADMIN ---------- */
.admin-tabs{display:flex; overflow-x:auto; gap:6px; padding:10px 12px; background:rgba(255,255,255,0.03); border-bottom:1px solid var(--glass-bd);}
.admin-tab{flex:none; padding:9px 14px; border-radius:10px; font-size:12.5px; font-weight:600; color:rgba(255,255,255,0.5);}
.admin-tab.active{background:var(--gold); color:var(--navy);}
.order-card{margin:12px 16px; padding:14px; border-radius:14px; background:var(--glass); border:1px solid var(--glass-bd);}
.order-card .oc-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
.order-card .oc-id{font-weight:700; color:var(--white); font-size:14px;}
.status-pill{font-size:10.5px; font-weight:700; padding:3px 10px; border-radius:20px; text-transform:uppercase;}
.status-pendiente{background:rgba(224,168,60,0.25); color:var(--warn);}
.status-listo{background:rgba(60,150,220,0.25); color:#6db8e8;}
.status-entregado{background:rgba(62,207,142,0.25); color:var(--ok);}
.oc-items{font-size:12.5px; color:rgba(255,255,255,0.6); margin-bottom:8px; line-height:1.5;}
.oc-actions{display:flex; gap:8px;}
.oc-actions button{flex:1; padding:9px; border-radius:10px; font-size:12px; font-weight:700;}
.btn-advance{background:var(--gold); color:var(--navy);}
.btn-wa-notify{background:#25D366; color:#fff; display:flex; align-items:center; justify-content:center; gap:5px;}

.admin-login{display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; padding:40px 24px; text-align:center;}
.admin-login img{width:80px; margin-bottom:18px;}

.prod-row{display:flex; gap:12px; padding:12px 16px; border-bottom:1px solid var(--glass-bd); align-items:center;}
.prod-row img{width:48px; height:48px; border-radius:10px; object-fit:cover; background:rgba(255,255,255,0.05); flex:none;}
.prod-row-body{flex:1; min-width:0;}
.prod-row-body h4{font-size:13px; color:var(--white); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.prod-row-body p{font-size:11.5px; color:rgba(255,255,255,0.5);}
.prod-row-actions{display:flex; gap:6px;}
.icon-btn{width:32px; height:32px; border-radius:8px; background:var(--glass); border:1px solid var(--glass-bd); display:flex; align-items:center; justify-content:center;}
.icon-btn svg{width:15px; height:15px;}

.prod-row-v2{padding:13px 16px; border-bottom:1px solid var(--glass-bd);}
.prod-row-v2-top{display:flex; gap:12px; align-items:flex-start; margin-bottom:10px;}
.prod-row-v2-top img{width:44px; height:44px; border-radius:10px; object-fit:cover; background:rgba(255,255,255,0.05); flex:none;}
.prod-row-v2-info{flex:1; min-width:0;}
.prod-row-v2-info h4{font-size:13.5px; color:var(--white); line-height:1.35; white-space:normal; word-break:break-word;}
.prod-row-v2-info p{font-size:11px; color:rgba(255,255,255,0.5); margin-top:2px;}
.prod-row-v2-bottom{display:flex; gap:8px; align-items:flex-end;}
.prod-row-v2-price-col{flex:1; min-width:0;}
.prod-row-v2-price-label{display:block; font-size:9px; color:rgba(255,255,255,0.4); font-weight:700; text-transform:uppercase; margin-bottom:3px;}
.prod-row-v2-price-col input{width:100%; padding:7px 8px; border-radius:8px; background:var(--glass); border:1px solid var(--glass-bd); font-weight:700; font-size:12.5px; text-align:center;}

.fab{position:fixed; bottom:24px; right:calc(50% - 240px + 18px); width:54px; height:54px; border-radius:50%;
  background:var(--gold); color:var(--navy); display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 20px rgba(197,160,40,0.4); z-index:80;}
@media (max-width:480px){.fab{right:18px;}}
.fab svg{width:24px; height:24px;}

.photo-upload-row{display:flex; gap:10px; margin:0 16px 14px;}
.photo-upload-box{flex:1; aspect-ratio:1; border-radius:14px; border:1.5px dashed var(--glass-bd);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  background:var(--glass); font-size:11px; color:rgba(255,255,255,0.55); position:relative; overflow:hidden;}
.photo-upload-box svg{width:22px; height:22px; opacity:.6;}
.photo-upload-box input[type=file]{position:absolute; inset:0; opacity:0; cursor:pointer;}
.photo-preview-wrap{margin:0 16px 14px; border-radius:14px; overflow:hidden; position:relative; aspect-ratio:1; background:rgba(255,255,255,0.05);}
.photo-preview-wrap img{width:100%; height:100%; object-fit:cover;}
.filter-row{display:flex; gap:8px; padding:0 16px 14px; overflow-x:auto;}
.filter-thumb{flex:none; width:54px; height:54px; border-radius:10px; overflow:hidden; border:2px solid transparent; position:relative;}
.filter-thumb.active{border-color:var(--gold);}
.filter-thumb img{width:100%; height:100%; object-fit:cover;}
.filter-thumb span{position:absolute; bottom:0; left:0; right:0; font-size:7px; text-align:center; background:rgba(0,0,0,0.5); color:#fff; padding:1px 0;}
.btn-ai-remove{margin:0 16px 14px; padding:13px; border-radius:12px; background:linear-gradient(120deg,#7b4fd6,#a35fe8);
  color:#fff; font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center; gap:8px;}
.btn-ai-remove[disabled]{opacity:.6;}
.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.cat-tree{padding:8px 16px;}
.cat-tree-item{padding:12px 14px; border-radius:12px; background:var(--glass); border:1px solid var(--glass-bd); margin-bottom:8px;}
.cat-tree-head{display:flex; justify-content:space-between; align-items:center; font-weight:600; font-size:13.5px; color:var(--white);}
.cat-tree-subs{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
.subcat-chip{font-size:12px; font-weight:600; padding:6px 12px; border-radius:14px;
  background:rgba(255,255,255,0.16); border:1px solid rgba(255,255,255,0.25);
  color:#ffffff; display:flex; align-items:center; gap:7px;}
.subcat-chip button{color:#ff8a9a; font-size:14px; font-weight:800; line-height:1;}

.client-row{display:flex; gap:12px; padding:13px 16px; border-bottom:1px solid var(--glass-bd); align-items:center;}
.client-rank{width:28px; height:28px; border-radius:50%; background:var(--glass); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--gold2); flex:none;}
.client-row-body{flex:1;}
.client-row-body h4{font-size:13.5px; color:var(--white);}
.client-row-body p{font-size:11px; color:rgba(255,255,255,0.5);}
.client-pts{font-weight:700; color:var(--gold2); font-size:14px;}

.settings-row{display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border-bottom:1px solid var(--glass-bd);}
.settings-row span{font-size:14px; color:var(--white);}
.toggle{width:44px; height:26px; border-radius:14px; background:rgba(255,255,255,0.15); position:relative; transition:.2s;}
.toggle.on{background:var(--gold);}
.toggle::after{content:''; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:.2s;}
.toggle.on::after{left:21px;}

.empty-cart-icon{width:60px; height:60px; opacity:.3; margin:40px auto 14px;}

/* ---------- COMPROBANTES (Factura / Remito / Ticket) ---------- */
.voucher-type-tabs{display:flex; gap:8px; padding:12px 16px;}
.voucher-type-tab{flex:1; padding:10px; border-radius:12px; text-align:center; font-size:12.5px; font-weight:700;
  background:var(--glass); border:1px solid var(--glass-bd); color:rgba(255,255,255,0.55);}
.voucher-type-tab.active{background:var(--gold); color:var(--navy); border-color:var(--gold);}

.voucher-row{display:flex; gap:12px; padding:13px 16px; border-bottom:1px solid var(--glass-bd); align-items:center;}
.voucher-row-icon{width:38px; height:38px; border-radius:10px; background:var(--glass); border:1px solid var(--glass-bd);
  display:flex; align-items:center; justify-content:center; flex:none; color:var(--gold2);}
.voucher-row-icon svg{width:18px; height:18px;}
.voucher-row-body{flex:1; min-width:0;}
.voucher-row-body h4{font-size:13px; color:var(--white);}
.voucher-row-body p{font-size:11px; color:rgba(255,255,255,0.5);}
.voucher-row-amount{font-weight:700; color:var(--gold2); font-size:14px; text-align:right;}

.voucher-doc{
  background:#fff; color:#1a1a1a; border-radius:12px; margin:14px 16px; padding:22px;
  font-family:'DM Sans',sans-serif; font-size:12.5px; line-height:1.5;
}
.voucher-doc .vd-head{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; border-bottom:2px solid #1a1a1a; padding-bottom:14px; margin-bottom:14px;}
.voucher-doc .vd-brand{display:flex; align-items:center; gap:10px;}
.voucher-doc .vd-brand img{width:46px;}
.voucher-doc .vd-brand h2{font-family:'Playfair Display',serif; font-size:17px; margin:0;}
.voucher-doc .vd-brand p{font-size:10.5px; color:#555; margin:0;}
.voucher-doc .vd-doctype{text-align:right; border:1.5px solid #1a1a1a; border-radius:8px; padding:8px 14px;}
.voucher-doc .vd-doctype .vd-letter{font-size:22px; font-weight:800; line-height:1;}
.voucher-doc .vd-doctype .vd-num{font-size:11px; font-weight:700; margin-top:4px;}
.voucher-doc .vd-meta{display:flex; justify-content:space-between; font-size:11px; color:#444; margin-bottom:14px;}
.voucher-doc table{width:100%; border-collapse:collapse; margin-bottom:14px;}
.voucher-doc th{text-align:left; font-size:10.5px; text-transform:uppercase; color:#666; border-bottom:1px solid #ccc; padding:6px 4px;}
.voucher-doc td{font-size:12px; padding:7px 4px; border-bottom:1px solid #eee;}
.voucher-doc .vd-totals{margin-left:auto; width:55%;}
.voucher-doc .vd-totals .row{display:flex; justify-content:space-between; padding:4px 0; font-size:12px;}
.voucher-doc .vd-totals .row.final{font-weight:800; font-size:15px; border-top:1.5px solid #1a1a1a; margin-top:4px; padding-top:8px;}
.voucher-doc .vd-footer{margin-top:18px; padding-top:12px; border-top:1px dashed #ccc; font-size:10px; color:#777; text-align:center;}
.voucher-doc .vd-alias{margin-top:16px; padding:10px 14px; border-radius:8px; background:#f6efd9; border:1px solid #d9c277;
  text-align:center; font-size:12px; color:#5a4a12;}
.voucher-doc .vd-alias b{font-size:13px; letter-spacing:.3px;}

.voucher-actions{display:flex; gap:10px; padding:0 16px 90px;}
.voucher-actions button{flex:1;}

.manual-item-row{display:flex; gap:8px; padding:0 16px 10px; align-items:center;}
.manual-item-row select{flex:2;}
.manual-item-row input{flex:1;}
</style>
</head>

function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      // Deep-merge nested config objects (fiscal, config, voucherCounters) so that
      // new default fields added in later app versions (e.g. aliasTransferencia)
      // aren't silently wiped out by an older saved object that lacks them.
      // A shallow Object.assign would replace state.fiscal entirely with the old
      // saved one, dropping any new keys that only exist in the fresh defaults.
      const nestedKeys = ["fiscal", "config", "voucherCounters"];
      nestedKeys.forEach(key=>{
        if(parsed[key]){
          parsed[key] = Object.assign({}, state[key], parsed[key]);
        }
      });
      state = Object.assign(state, parsed);
    }
  }catch(e){}
}

/* =========================================================
   API SYNC — sincronización directa con Supabase
   ========================================================= */
function getDb(){
  if(!window._sbClient) window._sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  return window._sbClient;
}

async function apiSyncProducts(){
  try{
    const { data, error } = await getDb().from('products').select('*');
    if(error) throw error;
    if(!data || data.length===0) return;
    const apiMapped = data.map(p=>({
      id: String(p.id),
      _apiId: p.id,
      name: p.name,
      desc: p.description||"",
      price: Number(p.price)||0,
      wholesalePrice: p.wholesale_price ? Number(p.wholesale_price) : null,
      stock: p.stock||0,
      photo: p.photo_url||"",
      section: p.section||"market",
      cat: p.cat||"General",
      sub: p.sub||"",
      sellByWeight: p.sell_by_weight||false,
      pricePerKg: p.price_per_kg ? Number(p.price_per_kg) : null,
      wholesalePricePerKg: p.wholesale_price_per_kg ? Number(p.wholesale_price_per_kg) : null,
      minGrams: p.min_grams||null,
    }));
    const localOnly = state.products.filter(p=>!p._apiId);
    const newProducts = [...apiMapped, ...localOnly];
    const changed = JSON.stringify(newProducts) !== JSON.stringify(state.products);
    state.products = newProducts;
    saveState();
    if(changed && !document.getElementById("product-modal-overlay")) render();
  }catch(e){ console.warn("No se pudo sincronizar productos desde Supabase:", e); }
}

async function apiSaveProduct(product){
  try{
    const body = {
      name: product.name,
      description: product.desc||"",
      price: product.price,
      wholesale_price: product.wholesalePrice||null,
      stock: product.stock||0,
      photo_url: product.photo||null,
      section: product.section,
      cat: product.cat,
      sub: product.sub||null,
      sell_by_weight: product.sellByWeight||false,
      price_per_kg: product.pricePerKg||null,
      wholesale_price_per_kg: product.wholesalePricePerKg||null,
      min_grams: product.minGrams||null,
    };
    if(product._apiId){
      const { error } = await getDb().from('products').update(body).eq('id', product._apiId);
      if(error) throw error;
    }else{
      const { data, error } = await getDb().from('products').insert([body]).select('id').single();
      if(error) throw error;
      product._apiId = data.id;
      product.id = String(data.id);
      saveState();
    }
  }catch(e){
    console.warn("No se pudo guardar producto en Supabase:", e);
    toast("Error Supabase: " + (e.message||JSON.stringify(e)), "err");
  }
}

async function apiDeleteProduct(product){
  if(!product || !product._apiId) return;
  try{
    const { error } = await getDb().from('products').delete().eq('id', product._apiId);
    if(error) throw error;
  }catch(e){ console.warn("No se pudo eliminar producto de Supabase:", e); }
}

async function apiSaveOrder(order){
  try{
    const phone = order.phone;
    if(!phone) return;
    let clientId;
    const { data: existing } = await getDb().from('clients').select('id').eq('phone', phone).limit(1);
    if(existing && existing.length>0){
      clientId = existing[0].id;
    }else{
      const { data: newClient, error: ce } = await getDb().from('clients').insert([{
        full_name: order.name, phone, address: order.address||""
      }]).select('id').single();
      if(ce) throw ce;
      clientId = newClient.id;
    }
    const { data: newOrder, error: oe } = await getDb().from('orders').insert([{
      client_id: clientId, total: order.total, status:'Pendiente', payment_method: order.payment_method||'Efectivo'
    }]).select('id').single();
    if(oe) throw oe;
    const items = order.items
      .map(it=>({ order_id: newOrder.id, product_id: Number(it._apiId||it.productId)||null, quantity: it.qty, unit_price: it.price }))
      .filter(it=>it.product_id);
    if(items.length>0){
      const { error: ie } = await getDb().from('order_items').insert(items);
      if(ie) throw ie;
    }
  }catch(e){ console.warn("No se pudo guardar pedido en Supabase:", e); }
}

/* =========================================================
   TOASTS
   ========================================================= */
function toast(msg, type){
  const wrap = document.getElementById("toast-wrap");
  const el = document.createElement("div");
  el.className = "toast " + (type||"");
  el.innerHTML = (type==="ok" ? `<span style="width:16px; height:16px; flex:none; display:inline-flex;">${ic("check")}</span>` : "") + "<span>"+msg+"</span>";
  wrap.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 2800);
}

/* =========================================================
   CART
   ========================================================= */
function addToCart(productId, qty){
  qty = qty || 1;
  const existing = state.cart.find(c=>c.id===productId && !c.grams);
  if(existing){ existing.qty += qty; }
  else{ state.cart.push({id:productId, qty}); }
  saveState();
  toast("Agregado al carrito", "ok");
  render();
}
function addToCartByWeight(productId, grams){
  const existing = state.cart.find(c=>c.id===productId && c.grams);
  if(existing){ existing.grams += grams; }
  else{ state.cart.push({id:productId, qty:1, grams}); }
  saveState();
  toast("Agregado al carrito", "ok");
  render();
}
function setCartQty(productId, qty){
  const item = state.cart.find(c=>c.id===productId && !c.grams);
  if(!item) return;
  if(qty<=0){ state.cart = state.cart.filter(c=>c!==item); }
  else{ item.qty = qty; }
  saveState(); render();
}
function setCartGrams(productId, grams){
  const item = state.cart.find(c=>c.id===productId && c.grams);
  if(!item) return;
  const p = state.products.find(pr=>pr.id===productId);
  const min = p?.minGrams || 50;
  if(grams<min){ state.cart = state.cart.filter(c=>c!==item); }
  else{ item.grams = grams; }
  saveState(); render();
}
function removeFromCart(productId){
  state.cart = state.cart.filter(c=>c.id!==productId);
  saveState(); render();
}
/* Returns the line total for a single cart item, handling both unit-based
   and weight-based (grams) products. */
function cartItemLineTotal(item){
  const p = state.products.find(pr=>pr.id===item.id);
  if(!p) return 0;
  if(item.grams){
    return (effectivePriceForWeight(p)/1000) * item.grams;
  }
  return effectivePrice(p) * item.qty;
}
function cartTotal(){
  return state.cart.reduce((sum,item)=> sum + cartItemLineTotal(item), 0);
}
function cartCount(){
  return state.cart.reduce((s,i)=>s+(i.grams?1:i.qty),0);
}
function money(n){
  return "$" + Number(n).toLocaleString("es-AR");
}
function formatOrderItemLabel(it){
  return it.grams ? `${it.grams}g de ${it.name}` : `${it.qty}x ${it.name}`;
}
/* Returns the price a logged-in client should see/pay for a product:
   wholesale price if the current client is marked wholesale AND the
   product has a wholesale price set, otherwise the normal price. */
function effectivePrice(product){
  if(!product) return 0;
  const client = state.currentClientPhone ? state.clients[state.currentClientPhone] : null;
  if(client && client.wholesale && product.wholesalePrice){
    return product.wholesalePrice;
  }
  return product.price;
}

/* =========================================================
   ORDERS
   ========================================================= */
function genOrderId(){
  return "SR" + Date.now().toString().slice(-6);
}
function placeOrder(customer){
  const items = state.cart.map(c=>{
    const p = state.products.find(pr=>pr.id===c.id);
    if(c.grams){
      return {id:c.id, name:p?p.name:"Producto", price:p?effectivePriceForWeight(p):0, qty:1, grams:c.grams, lineTotal:cartItemLineTotal(c)};
    }
    return {id:c.id, name:p?p.name:"Producto", price:p?effectivePrice(p):0, qty:c.qty, lineTotal:cartItemLineTotal(c)};
  });
  const order = {
    id: genOrderId(),
    date: new Date().toISOString(),
    customer,
    items,
    total: cartTotal(),
    status: "Pendiente",
  };
  state.orders.unshift(order);
  // decrement stock (unit-based products only — weight-based stock isn't tracked in units)
  items.forEach(it=>{
    const p = state.products.find(pr=>pr.id===it.id);
    if(p && !it.grams) p.stock = Math.max(0, p.stock - it.qty);
  });
  creditPointsToClient(customer, order.total, order.id);
  state.cart = [];
  saveState();
  return order;
}

/* Upserts a client profile by phone and credits loyalty points ($100 = 1pt).
   Reused by orders placed in the storefront, and by manual/automatic vouchers.
   Phone is normalized to +54 format so clients are recognized consistently
   regardless of which screen they entered their number on. */
function creditPointsToClient(customer, amount, refId){
  if(!customer || !customer.phone) return null;
  const phone = normalizePhone(customer.phone);
  if(!state.clients[phone]){
    state.clients[phone] = {phone, name:customer.name, address:customer.address||"", doc:customer.doc||"", points:0, orders:[]};
  }
  const c = state.clients[phone];
  c.name = customer.name || c.name;
  if(customer.address) c.address = customer.address;
  if(customer.doc) c.doc = customer.doc;
  c.points += Math.floor((amount||0)/100);
  if(refId) c.orders.unshift(refId);
  return c;
}
function tierFor(points){
  if(points>=500) return {key:"oro", label:"Oro"};
  if(points>=200) return {key:"plata", label:"Plata"};
  return {key:"bronce", label:"Bronce"};
}

/* =========================================================
   WHATSAPP MESSAGE BUILDERS
   ========================================================= */
function buildOrderWAMessage(order){
  let msg = `¡Hola! Quiero confirmar mi pedido #${order.id}\n\n`;
  order.items.forEach(it=>{
    const label = it.grams ? `${it.grams}g de` : `${it.qty}x`;
    msg += `• ${label} ${it.name} — ${money(it.lineTotal!=null?it.lineTotal:it.price*it.qty)}\n`;
  });
  msg += `\nTotal: ${money(order.total)}`;
  if(order.customer.address) msg += `\nDirección: ${order.customer.address}`;
  msg += `\nNombre: ${order.customer.name}`;
  return msg;
}
function buildStatusWAMessage(order){
  const map = {
    "Pendiente":`Hola ${order.customer.name}! Tu pedido #${order.id} en Sabores Royal está PENDIENTE de preparación. Te avisamos cuando esté listo 😊`,
    "Listo":`Hola ${order.customer.name}! Tu pedido #${order.id} en Sabores Royal ya está LISTO para retirar/entregar 🎉`,
    "Entregado":`Hola ${order.customer.name}! Tu pedido #${order.id} fue marcado como ENTREGADO. ¡Gracias por tu compra en Sabores Royal! 🙏`,
  };
  return map[order.status] || `Tu pedido #${order.id} cambió de estado: ${order.status}`;
}

  else if(r.screen==="catalog") html = renderCatalog(r.section);
  else if(r.screen==="product") html = renderProductDetail(r.id);
  else if(r.screen==="cart") html = renderCart();
  else if(r.screen==="checkout") html = renderCheckout();
  else if(r.screen==="success") html = renderSuccess(r.order);
  else if(r.screen==="orders") html = renderOrdersLookup();
  else if(r.screen==="account") html = renderAccount();
  else if(r.screen==="admin") html = renderAdmin();

  else if(r.screen==="price-list-view") html = renderPriceListView(r.productIds, r.priceMode);
  else if(r.screen==="suggestions") html = renderSuggestions();
  else html = renderHome();
  app.innerHTML = html + (["admin","voucher-view","price-list-view"].includes(r.screen) ? "" : renderBottomNav());

/* ---------- PRODUCT DETAIL ---------- */
function renderProductDetail(id){
  const p = state.products.find(pr=>pr.id===id);
  if(!p) return renderHome();
  if(p.sellByWeight){
    const grams = state.route.grams || p.minGrams || 50;
    const pricePerKgEff = effectivePriceForWeight(p);
    const lineTotal = (pricePerKgEff/1000)*grams;
    return `

        <button class="back" onclick="nav('catalog',{section:'${p.section}'})">${ic('chevron')}</button>

      <div class="pd-body">

        <p class="pd-desc">${p.desc||''}</p>
        <label style="display:block; font-size:12px; color:rgba(255,255,255,0.55); margin-bottom:8px; font-weight:600;">Cantidad (gramos)</label>
        <div class="qty-row">

          <input type="number" id="grams-input" value="${grams}" onchange="setDetailGrams(this.value)" style="width:80px; text-align:center; padding:8px; border-radius:10px; background:var(--glass); border:1px solid var(--glass-bd); color:var(--cream); font-size:16px; font-weight:700;">
          <button class="qty-btn" onclick="changeDetailGrams(50)">+</button>

        <button class="qty-btn" onclick="changeDetailQty(-1)">−</button>

function changeDetailQty(delta){
  const q = Math.max(1, (state.route.qty||1)+delta);
  state.route.qty = q; render();
}
function changeDetailGrams(delta){
  const p = state.products.find(pr=>pr.id===state.route.id);
  const min = p?.minGrams || 50;
  const g = Math.max(min, (state.route.grams||min)+delta);
  state.route.grams = g; render();
}
function setDetailGrams(val){
  const p = state.products.find(pr=>pr.id===state.route.id);
  const min = p?.minGrams || 50;
  state.route.grams = Math.max(min, Number(val)||min);
  render();
}
/* Returns the effective price-per-kg for a weight-sold product, applying
   wholesale pricing the same way effectivePrice() does for unit products. */
function effectivePriceForWeight(product){
  if(!product) return 0;
  const client = state.currentClientPhone ? state.clients[state.currentClientPhone] : null;
  if(client && client.wholesale && product.wholesalePricePerKg){
    return product.wholesalePricePerKg;
  }
  return product.pricePerKg;
}

function submitOrder(){

function loginAccount(){
  const rawPhone = document.getElementById("acc-phone").value.trim();
  if(!rawPhone){ toast("Ingresá un teléfono", "err"); return; }
  const phone = normalizePhone(rawPhone);
  if(state.clients[phone]){
    state.currentClientPhone = phone;
    saveState(); render();
  }else{
    state.route.accMode = "register";
    state.route.accPhone = phone;
    render();
  }
}
function normalizePhone(raw){
  const digits = raw.replace(/\D/g,'');
  if(digits.startsWith("54")) return "+"+digits;
  return "+54"+digits;
}
function completeRegistration(){
  const name = document.getElementById("reg-name").value.trim();
  const rawPhone = document.getElementById("reg-phone").value.trim();
  const doc = document.getElementById("reg-doc").value.trim();
  const address = document.getElementById("reg-address").value.trim();
  const city = document.getElementById("reg-city").value.trim();
  const province = document.getElementById("reg-province").value;
  if(!name || !rawPhone){ toast("Completá al menos nombre y teléfono", "err"); return; }
  const phone = normalizePhone(rawPhone);
  state.clients[phone] = { phone, name, doc, address, city, province, points:0, orders:[] };
  state.currentClientPhone = phone;
  state.route.accMode = null;
  saveState(); render();
  toast("¡Cuenta creada!", "ok");
}
function openEditProfileModal(){
  const client = state.clients[state.currentClientPhone];
  if(!client) return;
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "edit-profile-overlay";
  overlay.innerHTML = `

      <h3 class="modal-title">Editar mis datos</h3>

      <div class="form-group"><label>Ciudad</label><input id="ep-city" value="${client.city||''}"></div>
      <div class="form-group"><label>Provincia</label>
        <select id="ep-province">
          ${PROVINCIAS_AR.map(p=>`<option value="${p}" ${client.province===p?'selected':''}>${p}</option>`).join('')}

      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn-secondary" style="flex:1;" onclick="document.getElementById('edit-profile-overlay').remove()">Cancelar</button>
        <button class="btn-primary" style="flex:1;" onclick="saveProfileEdit()">Guardar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}
function saveProfileEdit(){
  const client = state.clients[state.currentClientPhone];
  if(!client) return;
  client.name = document.getElementById("ep-name").value.trim() || client.name;
  client.doc = document.getElementById("ep-doc").value.trim();
  client.address = document.getElementById("ep-address").value.trim();
  client.city = document.getElementById("ep-city").value.trim();
  client.province = document.getElementById("ep-province").value;
  saveState();
  document.getElementById("edit-profile-overlay").remove();
  render();
  toast("Datos actualizados", "ok");
}
function logoutAccount(){
  state.currentClientPhone = null;
  saveState(); render();
}

function renderSuggestions(){

function submitSuggestion(){
  const name = document.getElementById("sg-name").value.trim() || "Anónimo";
  const message = document.getElementById("sg-message").value.trim();
  if(!message){ toast("Escribí un mensaje antes de enviar", "err"); return; }

    phone: state.currentClientPhone || "",

    read: false,

function advanceOrderStatus(orderId){
  const order = state.orders.find(o=>o.id===orderId);
  if(!order) return;
  const flow = ["Pendiente","Listo","Entregado"];
  const idx = flow.indexOf(order.status);
  if(idx < flow.length-1){ order.status = flow[idx+1]; saveState(); render(); }
}
function notifyOrderWA(orderId){
  const order = state.orders.find(o=>o.id===orderId);
  if(!order) return;
  const msg = buildStatusWAMessage(order);
  window.open(waLink.call(null, msg).replace(WA_NUMBER, order.customer.phone.replace(/\D/g,'')), "_blank");

function updateProductPriceInline(productId, field, value){
  const p = state.products.find(pr=>pr.id===productId);
  if(!p) return;
  if(field==="price"){ p.price = Math.max(0, Number(value)||0); }
  else if(field==="wholesalePrice"){ p.wholesalePrice = value.trim()==="" ? null : Math.max(0, Number(value)||0); }
  else if(field==="pricePerKg"){ p.pricePerKg = Math.max(0, Number(value)||0); }
  else if(field==="wholesalePricePerKg"){ p.wholesalePricePerKg = value.trim()==="" ? null : Math.max(0, Number(value)||0); }
  saveState();
  toast("Precio actualizado", "ok");
}
function deleteProduct(id){
  const toDelete = state.products.find(p=>p.id===id);
  state.products = state.products.filter(p=>p.id!==id);
  saveState(); render();
  if(toDelete) apiDeleteProduct(toDelete);
}

/* ---------- PHOTO UPLOAD + FILTERS + AI BG REMOVAL + BACKGROUNDS + SIN TACC SEAL ---------- */
function onPhotoSelected(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    adminPhotoDraft.original = e.target.result;
    adminPhotoDraft.current = e.target.result;
    adminPhotoDraft.filter = "none";
    adminPhotoDraft.bgRemoved = false;
    adminPhotoDraft.bgRemovedImage = "";
    adminPhotoDraft.background = "none";
    adminPhotoDraft.sinTacc = false;
    document.getElementById("photo-preview-container").innerHTML = renderPhotoPreview();
  };
  reader.readAsDataURL(file);
}

const PHOTO_FILTERS = [
  {key:"none", label:"Original", css:""},
  {key:"vivid", label:"Vívido", css:"saturate(1.5) contrast(1.1)"},
  {key:"warm", label:"Cálido", css:"sepia(0.25) saturate(1.3)"},
  {key:"cool", label:"Frío", css:"hue-rotate(15deg) saturate(1.1)"},
  {key:"bw", label:"B&N", css:"grayscale(1)"},
  {key:"bright", label:"Brillo+", css:"brightness(1.25)"},
  {key:"dark", label:"Oscuro", css:"brightness(0.8) contrast(1.15)"},
  {key:"soft", label:"Suave", css:"contrast(0.9) brightness(1.05)"},
  {key:"sharp", label:"Nítido", css:"contrast(1.3) saturate(1.2)"},
  {key:"vintage", label:"Vintage", css:"sepia(0.4) contrast(0.9) brightness(0.95)"},
];

/* Backgrounds are drawn procedurally on canvas — no external images needed,
   so this works fully offline once the page itself has loaded. */
const PHOTO_BACKGROUNDS = [
  {key:"none", label:"Transparente"},
  {key:"white", label:"Blanco"},
  {key:"cream", label:"Crema"},
  {key:"lightgray", label:"Gris claro"},
  {key:"navy", label:"Navy marca"},
  {key:"gold", label:"Dorado marca"},
  {key:"wood", label:"Madera"},
  {key:"marble", label:"Mármol"},
  {key:"studio", label:"Estudio"},
];

function paintBackground(ctx, key, w, h){
  if(key==="none") return; // leave transparent
  if(key==="white"){ ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,w,h); return; }
  if(key==="cream"){ ctx.fillStyle="#f8f5ec"; ctx.fillRect(0,0,w,h); return; }
  if(key==="lightgray"){ ctx.fillStyle="#e9e9ec"; ctx.fillRect(0,0,w,h); return; }
  if(key==="navy"){
    const g = ctx.createLinearGradient(0,0,w,h);
    g.addColorStop(0,"#1a2a5e"); g.addColorStop(1,"#0f1c45");
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h); return;
  }
  if(key==="gold"){
    const g = ctx.createRadialGradient(w/2,h*0.35,10,w/2,h/2,w*0.7);
    g.addColorStop(0,"#f3d98a"); g.addColorStop(0.6,"#e0bb4a"); g.addColorStop(1,"#c5a028");
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h); return;
  }
  if(key==="studio"){
    const g = ctx.createRadialGradient(w/2,h*0.4,10,w/2,h/2,w*0.75);
    g.addColorStop(0,"#ffffff"); g.addColorStop(1,"#d7d7da");
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h); return;
  }
  if(key==="wood"){
    ctx.fillStyle="#8a5a35"; ctx.fillRect(0,0,w,h);
    ctx.globalAlpha=0.18;
    for(let i=0;i<14;i++){
      ctx.strokeStyle = i%2===0 ? "#6b4322" : "#a8703f";
      ctx.lineWidth = h/22;
      ctx.beginPath();
      const y = (i/14)*h + (Math.sin(i)*6);
      ctx.moveTo(0,y); ctx.bezierCurveTo(w*0.3,y+10,w*0.7,y-10,w,y);
      ctx.stroke();
    }
    ctx.globalAlpha=1; return;
  }
  if(key==="marble"){
    ctx.fillStyle="#f0eee9"; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle="rgba(170,170,165,0.35)";
    for(let i=0;i<9;i++){
      ctx.lineWidth = Math.random()*2+0.5;
      ctx.beginPath();
      const startX = Math.random()*w, startY = Math.random()*h;
      ctx.moveTo(startX,startY);
      ctx.bezierCurveTo(startX+Math.random()*120-60, startY+Math.random()*120-60, startX+Math.random()*200-100, startY+Math.random()*200-100, startX+Math.random()*260-130, startY+Math.random()*260-130);
      ctx.stroke();
    }
    return;
  }
}

function renderPhotoPreview(){
  const d = adminPhotoDraft;
  const filterCss = PHOTO_FILTERS.find(f=>f.key===d.filter)?.css || '';
  return `
    <div class="photo-preview-wrap" style="${d.bgRemoved && d.background==='none' ? 'background-image:repeating-conic-gradient(#3a3a3a 0% 25%, #2a2a2a 0% 50%) 0 0/16px 16px;' : ''}">
      <img id="photo-preview-img" src="${d.current}" style="filter:${filterCss}">
    </div>

    <label style="display:block; font-size:12px; color:rgba(255,255,255,0.55); margin:0 16px 8px; font-weight:600;">Filtro</label>
    <div class="filter-row">
      ${PHOTO_FILTERS.map(f=>`
        <div class="filter-thumb ${d.filter===f.key?'active':''}" onclick="applyPhotoFilter('${f.key}')">
          <img src="${d.bgRemoved ? d.bgRemovedImage : d.original}" style="filter:${f.css}">
          <span>${f.label}</span>
        </div>
      `).join('')}
    </div>

    <button class="btn-ai-remove" id="btn-ai-remove" onclick="removePhotoBackgroundAI()" ${aiProcessing?'disabled':''}>
      ${aiProcessing ? `<span class="spin">${ic('sparkle')}</span> Procesando...` : `${ic('sparkle')} ${d.bgRemoved ? 'Fondo quitado ✓' : 'Quitar fondo con IA'}`}
    </button>

    ${d.bgRemoved ? `
      <label style="display:block; font-size:12px; color:rgba(255,255,255,0.55); margin:14px 16px 8px; font-weight:600;">Fondo nuevo</label>
      <div class="filter-row" id="bg-thumb-row">
        ${PHOTO_BACKGROUNDS.map(bg=>`
          <div class="filter-thumb ${d.background===bg.key?'active':''}" onclick="applyPhotoBackground('${bg.key}')" style="background:transparent;">
            <canvas data-bg-thumb="${bg.key}" width="54" height="54" style="width:100%; height:100%; ${bg.key==='none'?"background-image:repeating-conic-gradient(#3a3a3a 0% 25%, #2a2a2a 0% 50%) 0 0/10px 10px;":""}"></canvas>
            <span>${bg.label}</span>
          </div>
        `).join('')}
      </div>

      <div class="settings-row" style="margin:14px 16px 0; border-radius:12px; background:var(--glass); border:1px solid var(--glass-bd);">
        <span>Agregar sello "Sin TACC"</span>
        <button class="toggle ${d.sinTacc?'on':''}" onclick="togglePhotoSinTacc()"></button>
      </div>
    ` : ''}
  `;
}

function paintSinTaccSeal(ctx, w, h){
  const r = Math.min(w,h) * 0.11;
  const cx = w - r - w*0.04;
  const cy = h - r - h*0.04;
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = "#ffffff";
  ctx.fill();
  ctx.lineWidth = r*0.12;
  ctx.strokeStyle = "#2e7d4f";
  ctx.stroke();
  ctx.fillStyle = "#2e7d4f";
  ctx.font = `700 ${r*0.34}px DM Sans, Arial, sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("SIN", cx, cy - r*0.22);
  ctx.fillText("TACC", cx, cy + r*0.24);
  ctx.restore();
}

/* Renders the small background-swatch thumbnails inside the modal using the
   same paintBackground() routine, so the preview always matches the real result. */
function renderBackgroundThumbnails(){
  PHOTO_BACKGROUNDS.forEach(bg=>{
    const canvas = document.querySelector(`canvas[data-bg-thumb="${bg.key}"]`);
    if(!canvas) return;
    const ctx = canvas.getContext("2d");
    paintBackground(ctx, bg.key, canvas.width, canvas.height);
  });
}

/* Recomposes the final image from: removed-bg source (or original) -> filter -> background -> seal.
   This is the single source of truth for what gets saved as the product photo. */
function recomposePhotoDraft(){
  const d = adminPhotoDraft;
  const baseSrc = d.bgRemoved ? d.bgRemovedImage : d.original;
  const img = new Image();
  img.onload = ()=>{
    const canvas = document.createElement("canvas");
    canvas.width = img.width; canvas.height = img.height;
    const ctx = canvas.getContext("2d");
    if(d.bgRemoved){ paintBackground(ctx, d.background, canvas.width, canvas.height); }
    ctx.filter = PHOTO_FILTERS.find(f=>f.key===d.filter)?.css || "none";
    ctx.drawImage(img, 0, 0);
    ctx.filter = "none";
    if(d.bgRemoved && d.sinTacc){ paintSinTaccSeal(ctx, canvas.width, canvas.height); }
    d.current = canvas.toDataURL("image/png");
    const container = document.getElementById("photo-preview-container");
    if(container){
      container.innerHTML = renderPhotoPreview();
      if(d.bgRemoved) renderBackgroundThumbnails();
    }
  };
  img.src = baseSrc;
}
function applyPhotoFilter(key){
  adminPhotoDraft.filter = key;
  recomposePhotoDraft();
}
function applyPhotoBackground(key){
  adminPhotoDraft.background = key;
  recomposePhotoDraft();
}
function togglePhotoSinTacc(){
  adminPhotoDraft.sinTacc = !adminPhotoDraft.sinTacc;
  recomposePhotoDraft();
}
async function removePhotoBackgroundAI(){
  if(!adminPhotoDraft.current){ toast("Subí una foto primero", "err"); return; }
  if(adminPhotoDraft.bgRemoved){ toast("El fondo ya fue quitado", "ok"); return; }
  aiProcessing = true;
  const btn = document.getElementById("btn-ai-remove");
  if(btn){ btn.innerHTML = `<span class="spin">${ic('sparkle')}</span> Procesando...`; btn.disabled = true; }
  try{
    const { removeBackground } = await import("https://esm.sh/@imgly/background-removal@1.5.7");
    const blob = await fetch(adminPhotoDraft.original).then(r=>r.blob());
    const resultBlob = await removeBackground(blob);
    const reader = new FileReader();
    reader.onload = (e)=>{
      adminPhotoDraft.bgRemoved = true;
      adminPhotoDraft.bgRemovedImage = e.target.result;
      adminPhotoDraft.background = "none";

      aiProcessing = false;
      recomposePhotoDraft();
      toast("Fondo eliminado — elegí un fondo nuevo si querés", "ok");
    };
    reader.readAsDataURL(resultBlob);
  }catch(err){
    aiProcessing = false;
    const container = document.getElementById("photo-preview-container");
    if(container) container.innerHTML = renderPhotoPreview();
    toast("No se pudo quitar el fondo. Probá con otra foto.", "err");
    console.error(err);
  }
}

/* =========================================================
   COMPROBANTES (Factura / Remito / Ticket — no fiscales)
   ========================================================= */
const VOUCHER_META = {
  factura:{label:"Factura", letter:"B", short:"FAC"},
  remito:{label:"Remito", letter:"X", short:"REM"},
  ticket:{label:"Ticket", letter:"-", short:"TIC"},
  presupuesto:{label:"Presupuesto", letter:"P", short:"PRE"},
};

function nextVoucherNumber(type){
  state.voucherCounters[type] = (state.voucherCounters[type]||0) + 1;
  return state.voucherCounters[type];
}
function formatVoucherNumber(type, num){
  return "0001-" + String(num).padStart(8,"0");
}

function calcIVADiscriminado(total){
  // Prices already include IVA. We discriminate it out, we don't add it on top.
  const pct = state.fiscal.ivaPorcentaje || 21;
  const neto = Math.round((total / (1 + pct/100)) * 100) / 100;
  const iva = Math.round((total - neto) * 100) / 100;
  return {pct, neto, iva, total};
}

/* Create a voucher object from a list of {name, qty, price} items.
   includeIVA: only meaningful for type 'factura' — whether to show IVA breakdown.
   Remito and Ticket never show IVA breakdown regardless of this flag. */
function createVoucher(type, items, customer, orderId, includeIVA, generalDiscount){
  const number = nextVoucherNumber(type);
  const afterItemDiscounts = items.reduce((s,it)=>{
    const lineTotal = it.price*it.qty;
    const discPct = Number(it.discountPct)||0;
    return s + lineTotal*(1-discPct/100);
  }, 0);
  const gd = generalDiscount || {type:"percent", value:0};
  const generalDiscountAmount = gd.value>0
    ? (gd.type==="percent" ? afterItemDiscounts*(gd.value/100) : Math.min(gd.value, afterItemDiscounts))
    : 0;
  const total = Math.max(0, afterItemDiscounts - generalDiscountAmount);
  const showIVA = type === "factura" && !!includeIVA;
  const ivaCalc = calcIVADiscriminado(total);
  const voucher = {
    id: "v"+Date.now()+Math.floor(Math.random()*1000),
    type, number,
    date: new Date().toISOString(),
    items, customer: customer||{name:"Consumidor Final", phone:"", address:""},
    total,
    generalDiscount: gd.value>0 ? gd : null,
    generalDiscountAmount,
    showIVA,
    ivaPct: ivaCalc.pct, iva: ivaCalc.iva, neto: ivaCalc.neto,
    orderId: orderId||null,
  };
  state.vouchers.unshift(voucher);
  // Credit points only for vouchers not tied to an order (orders already credit
  // points themselves), not for presupuestos (quotes aren't confirmed sales),
  // and only for phones that are already a known client — brand-new clients are
  // offered a save prompt instead, to respect the "ask before saving" preference.
  if(!orderId && type !== "presupuesto" && customer && customer.phone && state.clients[normalizePhone(customer.phone)]){
    creditPointsToClient(customer, total, voucher.id);
  }
  saveState();
  return voucher;
}

/* Computes the final total for the manual voucher draft, applying per-item
   discounts first, then the general discount (percent or fixed amount) on
   top of that subtotal. Returns the breakdown so the UI can show each step. */
function computeManualVoucherTotal(d){
  const subtotal = d.items.reduce((s,it)=>s+(it.price||0)*(Number(it.qty)||0),0);
  const afterItemDiscounts = d.items.reduce((s,it)=>{
    const lineTotal = (it.price||0)*(Number(it.qty)||0);
    const discPct = Number(it.discountPct)||0;
    return s + lineTotal*(1-discPct/100);
  },0);
  let generalDiscountAmount = 0;
  const gdType = d.generalDiscountType || "percent";
  const gdValue = Number(d.generalDiscountValue)||0;
  if(gdValue > 0){
    generalDiscountAmount = gdType === "percent" ? afterItemDiscounts*(gdValue/100) : Math.min(gdValue, afterItemDiscounts);
  }
  const total = Math.max(0, afterItemDiscounts - generalDiscountAmount);
  return { subtotal, afterItemDiscounts, generalDiscountAmount, total };
}
function renderManualVoucherTotals(){
  const d = manualVoucherDraft;
  const breakdown = computeManualVoucherTotal(d);
  const hasItemDiscounts = d.items.some(it=>(Number(it.discountPct)||0) > 0);
  let rows = "";
  if(hasItemDiscounts){
    rows += `<div class="summary-row"><span>Subtotal sin descuentos</span><span>${money(breakdown.subtotal)}</span></div>`;
    rows += `<div class="summary-row"><span>Después de descuentos por ítem</span><span>${money(breakdown.afterItemDiscounts)}</span></div>`;
  }
  if(breakdown.generalDiscountAmount > 0){
    rows += `<div class="summary-row"><span>Descuento general</span><span>-${money(breakdown.generalDiscountAmount)}</span></div>`;
  }
  if(d.type==="factura" && d.includeIVA){
    const c = calcIVADiscriminado(breakdown.total);
    rows += `
      <div class="summary-row"><span>Neto</span><span>${money(c.neto)}</span></div>
      <div class="summary-row"><span>IVA (${c.pct}%, incluido)</span><span>${money(c.iva)}</span></div>
    `;
  }
  rows += `<div class="summary-row total"><span>Total</span><span>${money(breakdown.total)}</span></div>`;
  return rows;
}

/* Edit an existing voucher in place: keeps id, number and original date,
   recalculates total/IVA breakdown from the new items/type/customer. */
function updateVoucherInPlace(voucherId, type, items, customer, includeIVA, generalDiscount){
  const voucher = state.vouchers.find(v=>v.id===voucherId);
  if(!voucher) return null;
  const afterItemDiscounts = items.reduce((s,it)=>{
    const lineTotal = it.price*it.qty;
    const discPct = Number(it.discountPct)||0;
    return s + lineTotal*(1-discPct/100);
  }, 0);
  const gd = generalDiscount || {type:"percent", value:0};
  const generalDiscountAmount = gd.value>0
    ? (gd.type==="percent" ? afterItemDiscounts*(gd.value/100) : Math.min(gd.value, afterItemDiscounts))
    : 0;
  const total = Math.max(0, afterItemDiscounts - generalDiscountAmount);
  const showIVA = type === "factura" && !!includeIVA;
  const ivaCalc = calcIVADiscriminado(total);
  voucher.type = type;
  voucher.items = items;
  voucher.customer = customer;
  voucher.total = total;
  voucher.generalDiscount = gd.value>0 ? gd : null;
  voucher.generalDiscountAmount = generalDiscountAmount;
  voucher.showIVA = showIVA;
  voucher.ivaPct = ivaCalc.pct;
  voucher.iva = ivaCalc.iva;
  voucher.neto = ivaCalc.neto;
  voucher.editedAt = new Date().toISOString();
  saveState();
  return voucher;
}

async function downloadVoucherPDF(voucherId){
  const voucher = state.vouchers.find(v=>v.id===voucherId);
  if(!voucher) return;
  const btn = document.getElementById("btn-download-pdf");
  const originalLabel = btn ? btn.innerHTML : null;
  if(btn){ btn.innerHTML = `<span class="spin">${ic('sparkle')}</span> Generando...`; btn.disabled = true; }

  // Open the window IMMEDIATELY, synchronously within the click handler.
  // Safari (especially iOS) only allows window.open() to succeed when it's directly
  // tied to a user gesture — any await before calling it breaks that link and the
  // popup gets silently blocked, which is why the button looked like it "did nothing".
  const win = window.open("", "_blank");
  if(win){ win.document.write("<title>Generando PDF…</title><body style='font-family:sans-serif; padding:24px; color:#444;'>Generando el comprobante, un momento…</body>"); }

  try{
    const [html2canvasMod, jsPDFMod] = await Promise.all([
      import("https://esm.sh/html2canvas@1.4.1"),
      import("https://esm.sh/jspdf@2.5.1"),
    ]);
    const html2canvas = html2canvasMod.default || html2canvasMod;
    const jsPDF = jsPDFMod.jsPDF || jsPDFMod.default || jsPDFMod;
    const source = document.getElementById("voucher-doc-content");
    if(!source) throw new Error("No se encontró el documento");
    // Small delay ensures any pending layout/reflow (e.g. blocks added right
    // before this call) is fully settled before html2canvas reads the DOM.
    await new Promise(r => setTimeout(r, 50));
    const canvas = await html2canvas(source, {
      scale: 2,
      backgroundColor: "#ffffff",
      windowWidth: source.scrollWidth,
      windowHeight: source.scrollHeight,
      height: source.scrollHeight,
      width: source.scrollWidth,
    });
    const imgData = canvas.toDataURL("image/png");
    const pdf = new jsPDF({ unit: "pt", format: "a4" });
    const pageWidth = pdf.internal.pageSize.getWidth();
    const margin = 24;
    const usableWidth = pageWidth - margin*2;
    const imgHeight = (canvas.height * usableWidth) / canvas.width;
    pdf.addImage(imgData, "PNG", margin, margin, usableWidth, imgHeight);
    const blob = pdf.output("blob");
    const blobUrl = URL.createObjectURL(blob);
    if(win && !win.closed){
      win.location.href = blobUrl;
    }else{
      // Popup was blocked or closed by the user: fall back to navigating this tab
      window.location.href = blobUrl;
    }
    toast("PDF listo — usá el botón compartir para guardarlo", "ok");
  }catch(err){
    console.error(err);
    if(win && !win.closed) win.close();
    toast("No se pudo generar el PDF. Probá con 'Imprimir' y guardar como PDF.", "err");
  }finally{
    if(btn){ btn.innerHTML = originalLabel; btn.disabled = false; }
  }
}

function shareVoucherWA(voucherId){
  const voucher = state.vouchers.find(v=>v.id===voucherId);
  if(!voucher) return;
  let msg = `${VOUCHER_META[voucher.type].label} ${formatVoucherNumber(voucher.type, voucher.number)} — Sabores Royal\n\n`;
  voucher.items.forEach(it=>{ msg += `• ${it.qty}x ${it.name}${voucher.type!=="remito"?` — ${money(it.price*it.qty)}`:''}\n`; });
  if(voucher.type!=="remito") msg += `\nTotal: ${money(voucher.total)}`;
  if(voucher.type==="presupuesto") msg += `\n\nPresupuesto sin cargo, sujeto a confirmación y disponibilidad de stock.`;
  if(voucher.type!=="remito" && voucher.type!=="presupuesto" && state.fiscal.aliasTransferencia) msg += `\n\nTransferencias a alias: ${state.fiscal.aliasTransferencia}`;
  const phone = voucher.customer.phone ? voucher.customer.phone.replace(/\D/g,'') : WA_NUMBER;
  window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(msg), "_blank");
}

/* ---------- Admin: Comprobantes tab (history list) ---------- */

/* ---------- ADMIN: SUGERENCIAS ---------- */
function renderAdminSugerencias(){
  if(state.suggestions.length===0){
    return `<div class="empty-state">${ic('sparkle')}<p>Todavía no llegaron sugerencias.</p></div>`;
  }
  return state.suggestions.map(s=>`
    <div class="order-card" style="${s.read?'opacity:.6;':''}" onclick="markSuggestionRead('${s.id}')">
      <div class="oc-head">
        <span class="oc-id">${s.name}${s.phone?` · ${s.phone}`:''}</span>
        ${!s.read?'<span class="status-pill status-pendiente">Nueva</span>':''}
      </div>
      <div class="oc-items" style="color:rgba(255,255,255,0.8); font-size:13px;">${s.message}</div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
        <span style="font-size:11px; color:rgba(255,255,255,0.4);">${new Date(s.date).toLocaleDateString('es-AR')}</span>
        <button class="icon-btn" onclick="event.stopPropagation(); deleteSuggestion('${s.id}')">${ic('trash')}</button>
      </div>
    </div>
  `).join('');
}
function markSuggestionRead(id){
  const s = state.suggestions.find(sg=>sg.id===id);
  if(s && !s.read){ s.read = true; saveState(); render(); }
}
function deleteSuggestion(id){
  if(!confirm("¿Eliminar esta sugerencia?")) return;
  state.suggestions = state.suggestions.filter(s=>s.id!==id);
  saveState(); render();
}

/* ---------- ADMIN: BANNERS (ofertas / novedades en el home) ---------- */
function renderAdminBanners(){
  if(state.banners.length===0){
    return `<div class="empty-state">${ic('sparkle')}<p>Todavía no armaste banners para el inicio.</p></div>`;
  }
  return state.banners.map((b,idx)=>`
    <div class="prod-row">
      <img src="${b.image||''}" onerror="this.style.opacity=0" style="background:${b.image?'none':'var(--gold)'};">
      <div class="prod-row-body">
        <h4>${b.title||'(sin título)'}</h4>
        <p>${b.subtitle||''}${b.section?` · Enlaza a ${SECTION_META[b.section]?.label||b.section}`:''}</p>
      </div>
      <div class="prod-row-actions">
        <button class="icon-btn" onclick="openBannerModal(${idx})">${ic('edit')}</button>
        <button class="icon-btn" onclick="deleteBanner(${idx})">${ic('trash')}</button>
      </div>
    </div>
  `).join('');
}
let bannerDraft = { image:"", title:"", subtitle:"", section:"" };
function openBannerModal(idx){
  const b = idx!==null ? state.banners[idx] : null;
  bannerDraft = b ? Object.assign({}, b) : { image:"", title:"", subtitle:"", section:"" };
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "banner-modal-overlay";
  overlay.innerHTML = renderBannerModalContent(idx);
  document.body.appendChild(overlay);
}
function renderBannerModalContent(idx){
  return `
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h3 class="modal-title">${idx!==null?'Editar banner':'Nuevo banner'}</h3>
      <div id="banner-photo-preview">
        ${bannerDraft.image ? `<div class="photo-preview-wrap" style="aspect-ratio:16/8;"><img src="${bannerDraft.image}" style="width:100%; height:100%; object-fit:cover;"></div>` : ''}
      </div>
      <div class="photo-upload-row">
        <div class="photo-upload-box" style="aspect-ratio:16/8; flex:2;">
          ${ic('upload')}<span>Desde galería</span>
          <input type="file" accept="image/*" onchange="onBannerPhotoSelected(event)">
        </div>
        <div class="photo-upload-box" style="aspect-ratio:16/8; flex:2;">
          ${ic('camera')}<span>Sacar foto</span>
          <input type="file" accept="image/*" capture="environment" onchange="onBannerPhotoSelected(event)">
        </div>
      </div>
      <div class="form-group"><label>Título</label><input id="bn-title" value="${bannerDraft.title}" placeholder="Ej: 2x1 en chocolates"></div>
      <div class="form-group"><label>Subtítulo (opcional)</label><input id="bn-subtitle" value="${bannerDraft.subtitle}" placeholder="Ej: Solo este finde"></div>
      <div class="form-group"><label>Al tocarlo, llevar a (opcional)</label>
        <select id="bn-section">
          <option value="">Sin enlace</option>
          ${Object.keys(SECTION_META).map(k=>`<option value="${k}" ${bannerDraft.section===k?'selected':''}>${SECTION_META[k].label}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn-secondary" style="flex:1;" onclick="closeBannerModal()">Cancelar</button>
        <button class="btn-primary" style="flex:1;" onclick="saveBannerModal(${idx})">Guardar</button>
      </div>
    </div>
  `;
}
function onBannerPhotoSelected(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    bannerDraft.image = e.target.result;
    const preview = document.getElementById("banner-photo-preview");
    if(preview) preview.innerHTML = `<div class="photo-preview-wrap" style="aspect-ratio:16/8;"><img src="${bannerDraft.image}" style="width:100%; height:100%; object-fit:cover;"></div>`;
  };
  reader.readAsDataURL(file);
}
function closeBannerModal(){
  const el = document.getElementById("banner-modal-overlay");
  if(el) el.remove();
}
function saveBannerModal(idx){
  bannerDraft.title = document.getElementById("bn-title").value.trim();
  bannerDraft.subtitle = document.getElementById("bn-subtitle").value.trim();
  bannerDraft.section = document.getElementById("bn-section").value;
  if(!bannerDraft.title && !bannerDraft.image){ toast("Agregá al menos un título o una imagen", "err"); return; }
  if(idx!==null && idx!==undefined && state.banners[idx]){
    state.banners[idx] = Object.assign({}, bannerDraft);
  }else{
    state.banners.push(Object.assign({}, bannerDraft));
  }
  saveState();
  closeBannerModal();
  render();
  toast("Banner guardado", "ok");
}
function deleteBanner(idx){
  if(!confirm("¿Eliminar este banner del inicio?")) return;
  state.banners.splice(idx,1);
  saveState(); render();
}

/* =========================================================
   LISTAS DE PRECIOS
   Flexible scope: everything, a whole section, a whole category,
   a whole subcategory, or hand-picked individual products. Price
   column can show normal, wholesale, or both side by side.
   ========================================================= */
let priceListDraft = { scope:{}, priceMode:"normal" }; // scope: {productId: true} when selected

function renderAdminListaPrecios(){
  const d = priceListDraft;
  const selectedCount = Object.values(d.scope).filter(Boolean).length;
  return `
    <div class="form-group" style="margin-top:14px;">
      <label>¿Qué precios mostrar?</label>
      <select onchange="priceListDraft.priceMode=this.value; renderPriceListScopeTree();">
        <option value="normal" ${d.priceMode==='normal'?'selected':''}>Solo precio normal</option>
        <option value="wholesale" ${d.priceMode==='wholesale'?'selected':''}>Solo precio mayorista</option>
        <option value="both" ${d.priceMode==='both'?'selected':''}>Ambos precios</option>
      </select>
    </div>

    <div style="display:flex; gap:10px; padding:0 16px 14px;">
      <button class="btn-secondary" style="flex:1; font-size:12.5px;" onclick="selectAllPriceListScope(true)">Seleccionar todo</button>
      <button class="btn-secondary" style="flex:1; font-size:12.5px;" onclick="selectAllPriceListScope(false)">Deseleccionar todo</button>
    </div>

    <div id="price-list-scope-tree">${renderPriceListScopeTreeHTML()}</div>

    <div style="padding:6px 16px 90px;">
      <button class="btn-primary" onclick="generatePriceListDocument()">${ic('receipt')} Generar lista (${selectedCount} producto${selectedCount===1?'':'s'})</button>
    </div>
  `;
}

function renderPriceListScopeTreeHTML(){
  return Object.keys(SECTION_META).map(section=>{
    const cats = state.categories[section]||{};
    const sectionProducts = state.products.filter(p=>p.section===section);
    if(sectionProducts.length===0) return "";
    return `
    <div style="padding:10px 16px 0;">
      <div class="cat-tree-item">
        <div class="cat-tree-head">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
            <input type="checkbox" ${sectionProducts.every(p=>priceListDraft.scope[p.id])?'checked':''} onchange="toggleScopeGroup(this.checked, ${JSON.stringify(sectionProducts.map(p=>p.id))})">
            ${SECTION_META[section].label}
          </label>
        </div>
        ${Object.keys(cats).map(cat=>{
          const catProducts = sectionProducts.filter(p=>p.cat===cat);
          if(catProducts.length===0) return "";
          return `
          <div style="margin:10px 0 0 14px; padding:8px 0 0; border-top:1px solid var(--glass-bd);">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; color:rgba(255,255,255,0.85); margin-bottom:6px;">
              <input type="checkbox" ${catProducts.every(p=>priceListDraft.scope[p.id])?'checked':''} onchange="toggleScopeGroup(this.checked, ${JSON.stringify(catProducts.map(p=>p.id))})">
              ${cat}
            </label>
            <div style="margin-left:22px; display:flex; flex-direction:column; gap:5px;">
              ${catProducts.map(p=>`
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:12.5px; color:rgba(255,255,255,0.65);">
                  <input type="checkbox" ${priceListDraft.scope[p.id]?'checked':''} onchange="toggleScopeProduct('${p.id}', this.checked)">
                  ${p.name}
                </label>
              `).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}
function renderPriceListScopeTree(){
  const el = document.getElementById("price-list-scope-tree");
  if(el) el.innerHTML = renderPriceListScopeTreeHTML();
}
function toggleScopeProduct(productId, checked){
  priceListDraft.scope[productId] = checked;
  renderPriceListScopeTree();
  render(); // refresh the "Generar lista (N)" counter button
}
function toggleScopeGroup(checked, productIds){
  productIds.forEach(id=> priceListDraft.scope[id] = checked);
  renderPriceListScopeTree();
  render();
}
function selectAllPriceListScope(value){
  state.products.forEach(p=> priceListDraft.scope[p.id] = value);
  render();
}

function generatePriceListDocument(){
  const selectedIds = Object.keys(priceListDraft.scope).filter(id=>priceListDraft.scope[id]);
  if(selectedIds.length===0){ toast("Seleccioná al menos un producto", "err"); return; }
  const products = state.products.filter(p=>selectedIds.includes(p.id));
  nav("price-list-view", { productIds: selectedIds, priceMode: priceListDraft.priceMode });
}

function buildPriceListDocHTML(productIds, priceMode){
  const products = state.products.filter(p=>productIds.includes(p.id));
  const dateStr = new Date().toLocaleDateString("es-AR", {day:"2-digit", month:"2-digit", year:"numeric"});
  const showNormal = priceMode!=="wholesale";
  const showWholesale = priceMode==="wholesale" || priceMode==="both";
  // Group by section -> category, same structure as the catalog itself
  let rows = "";
  Object.keys(SECTION_META).forEach(section=>{
    const sectionProducts = products.filter(p=>p.section===section);
    if(sectionProducts.length===0) return;
    rows += `<tr><td colspan="${1+(showNormal?1:0)+(showWholesale?1:0)}" style="padding-top:14px; font-weight:800; font-size:13px; border-bottom:1.5px solid #1a1a1a;">${SECTION_META[section].label}</td></tr>`;
    const cats = [...new Set(sectionProducts.map(p=>p.cat))];
    cats.forEach(cat=>{
      const catProducts = sectionProducts.filter(p=>p.cat===cat);
      rows += `<tr><td colspan="${1+(showNormal?1:0)+(showWholesale?1:0)}" style="padding-top:8px; font-weight:600; font-size:11.5px; color:#666;">${cat}</td></tr>`;
      catProducts.forEach(p=>{
        rows += `<tr>
          <td>${p.name}</td>
          ${showNormal?`<td style="text-align:right;">${money(p.price)}</td>`:''}
          ${showWholesale?`<td style="text-align:right; color:#1a6ea8;">${p.wholesalePrice?money(p.wholesalePrice):'—'}</td>`:''}
        </tr>`;
      });
    });
  });
  return `
    <div class="vd-head">
      <div class="vd-brand">
        <img src="${LOGO_DATA_URL}" alt="">
        <div>
          <h2>${state.fiscal.razonSocial}</h2>
          <p>${state.fiscal.domicilio}</p>
        </div>
      </div>
      <div class="vd-doctype">
        <div class="vd-letter" style="font-size:16px;">Lista de<br>Precios</div>
        <div class="vd-num">${dateStr}</div>
      </div>
    </div>
    <table>
      <thead><tr><th>Producto</th>${showNormal?'<th style="text-align:right;">Precio</th>':''}${showWholesale?'<th style="text-align:right;">Mayorista</th>':''}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="vd-footer">Lista de precios sujeta a modificaciones sin previo aviso · Sabores Royal — ${state.fiscal.domicilio}</div>
  `;
}

function renderPriceListView(productIds, priceMode){
  if(!productIds || productIds.length===0) return renderAdmin();
  return `
  <div class="screen">
    <div class="topbar">
      <button class="back" onclick="nav('admin')">${ic('chevron')}</button>
      <h2>Lista de Precios</h2>
    </div>
    <div class="voucher-doc" id="price-list-doc-content">
      ${buildPriceListDocHTML(productIds, priceMode)}
    </div>
    <div class="voucher-actions">
      <button class="btn-secondary" onclick="printPriceList()">${ic('printer')} Imprimir</button>
      <button class="btn-outline-gold" id="btn-download-pricelist-pdf" onclick="downloadPriceListPDF()">${ic('download')} PDF</button>
      <button class="btn-primary" onclick="openPriceListWAShare()">${ic('wa')} Enviar</button>
    </div>
  </div>`;
}

  const win = window.open("", "_blank");
  win.document.write(`
    <html><head><title>Lista de Precios — Sabores Royal</title>
    <style>
      body{font-family:'DM Sans',Arial,sans-serif; color:#1a1a1a; padding:24px; font-size:13px;}
      .vd-head{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; border-bottom:2px solid #1a1a1a; padding-bottom:14px; margin-bottom:14px;}

async function downloadPriceListPDF(){
  const btn = document.getElementById("btn-download-pricelist-pdf");
  const originalLabel = btn ? btn.innerHTML : null;
  if(btn){ btn.innerHTML = `<span class="spin">${ic('sparkle')}</span> Generando...`; btn.disabled = true; }
  const win = window.open("", "_blank");
  if(win){ win.document.write("<title>Generando PDF…</title><body style='font-family:sans-serif; padding:24px; color:#444;'>Generando la lista de precios, un momento…</body>"); }
  try{
    const [html2canvasMod, jsPDFMod] = await Promise.all([
      import("https://esm.sh/html2canvas@1.4.1"),
      import("https://esm.sh/jspdf@2.5.1"),
    ]);
    const html2canvas = html2canvasMod.default || html2canvasMod;
    const jsPDF = jsPDFMod.jsPDF || jsPDFMod.default || jsPDFMod;
    const source = document.getElementById("price-list-doc-content");
    if(!source) throw new Error("No se encontró el documento");
    await new Promise(r => setTimeout(r, 50));
    const canvas = await html2canvas(source, {
      scale: 2, backgroundColor: "#ffffff",
      windowWidth: source.scrollWidth, windowHeight: source.scrollHeight,
      height: source.scrollHeight, width: source.scrollWidth,
    });
    const imgData = canvas.toDataURL("image/png");
    const pdf = new jsPDF({ unit: "pt", format: "a4" });
    const pageWidth = pdf.internal.pageSize.getWidth();
    const margin = 24;
    const usableWidth = pageWidth - margin*2;
    const imgHeight = (canvas.height * usableWidth) / canvas.width;
    pdf.addImage(imgData, "PNG", margin, margin, usableWidth, imgHeight);
    const blob = pdf.output("blob");
    const blobUrl = URL.createObjectURL(blob);
    if(win && !win.closed){ win.location.href = blobUrl; } else { window.location.href = blobUrl; }
    toast("PDF listo — usá el botón compartir para guardarlo", "ok");
  }catch(err){
    console.error(err);
    if(win && !win.closed) win.close();
    toast("No se pudo generar el PDF. Probá con 'Imprimir' y guardar como PDF.", "err");
  }finally{
    if(btn){ btn.innerHTML = originalLabel; btn.disabled = false; }
  }
}

function openPriceListWAShare(){
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "pricelist-wa-overlay";
  overlay.innerHTML = `
    <div class="modal-sheet">

      <h3 class="modal-title">Enviar lista de precios</h3>

      <button class="btn-primary" onclick="sendPriceListWA()">${ic('wa')} Enviar por WhatsApp</button>
      <button class="btn-secondary" style="margin-top:10px;" onclick="document.getElementById('pricelist-wa-overlay').remove()">Cancelar</button>
    </div>
  `;
  document.body.appendChild(overlay);
}
function sendPriceListWA(){
  const phoneInput = document.getElementById("pricelist-wa-phone");
  const phone = phoneInput && phoneInput.value.trim() ? phoneInput.value.replace(/\D/g,'') : WA_NUMBER;
  let msg = `Lista de Precios — Sabores Royal\n\n`;
  msg += `Te comparto nuestra lista de precios actualizada. Cualquier consulta, escribime por aquí. 😊`;
  window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(msg), "_blank");
  const overlay = document.getElementById("pricelist-wa-overlay");
  if(overlay) overlay.remove();
}
